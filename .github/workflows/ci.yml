name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-bench:
    name: build + bench (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Install Ninja and GLFW system deps (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            xorg-dev \
            libwayland-dev \
            libxkbcommon-dev

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j

      - name: Run unit tests
        run: ctest --test-dir build --output-on-failure

      - name: Run benchmark and validate ratios
        run: |
          set -euo pipefail
          OUTPUT=$(./build/voxel_engine --bench)
          echo "$OUTPUT"

          # Greedy meshing ratio (contiguous chunk, first 'NN.NNx fewer quads' line).
          GREEDY=$(echo "$OUTPUT" | grep -oE '[0-9]+\.[0-9]+x fewer quads' | head -1 | grep -oE '[0-9]+\.[0-9]+')
          if [ -z "$GREEDY" ]; then
            echo "Failed to parse greedy ratio from --bench output"; exit 1
          fi

          # Cull ratios from the stable BENCH_SUMMARY line.
          SUMMARY=$(echo "$OUTPUT" | grep '^BENCH_SUMMARY ' | head -1)
          if [ -z "$SUMMARY" ]; then
            echo "Failed to find BENCH_SUMMARY line in --bench output"; exit 1
          fi
          CHUNK_TIGHT=$(echo "$SUMMARY"      | grep -oE 'chunk_tight=[0-9]+\.[0-9]+'      | cut -d= -f2)
          SECTION_NONEMPTY=$(echo "$SUMMARY" | grep -oE 'section_nonempty=[0-9]+\.[0-9]+' | cut -d= -f2)
          SECTION_TOTAL=$(echo "$SUMMARY"    | grep -oE 'section_total=[0-9]+\.[0-9]+'    | cut -d= -f2)
          OCCL_CAVE=$(echo "$SUMMARY"        | grep -oE 'occl_cave=[0-9]+\.[0-9]+'        | cut -d= -f2)

          echo "Measured: greedy=${GREEDY}x  chunk_tight=${CHUNK_TIGHT}x  section_nonempty=${SECTION_NONEMPTY}x  section_total=${SECTION_TOTAL}x  occl_cave=${OCCL_CAVE}x"

          # Thresholds carry ~10% slack below current measurements (M4 18.1 / 2.96 / 3.09 / 12.35).
          # If GH-hosted runners drift further, raise the slack rather than tightening the code.
          gate() {
              awk -v name="$1" -v val="$2" -v min="$3" \
                'BEGIN { if (val+0 < min+0) { printf "%s = %s below threshold %s\n", name, val, min; exit 1 }
                         else                 { printf "%s = %s OK (>= %s)\n",        name, val, min } }'
          }
          gate greedy            "$GREEDY"           15.0
          gate chunk_tight       "$CHUNK_TIGHT"       2.7
          gate section_nonempty  "$SECTION_NONEMPTY"  2.8
          gate section_total     "$SECTION_TOTAL"    11.0
          # Measured 70.8x on M4; the drawn count in the cave is tiny (~4
          # sections) so the ratio is sensitive to mesher/terrain tweaks.
          # Gate loosely: the claim is "order of magnitude underground".
          gate occl_cave         "$OCCL_CAVE"        10.0

  sanitizers:
    name: sanitizers (TSan + ASan/UBSan)
    runs-on: ubuntu-latest
    env:
      CC: clang
      CXX: clang++
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build clang \
            libgl1-mesa-dev libglu1-mesa-dev xorg-dev \
            libwayland-dev libxkbcommon-dev

      # ThreadSanitizer over the lock-free queue + worker pool, then ASan+UBSan
      # over the full logic suite. Any race / memory error / UB (outside the
      # documented FastNoiseLite hash-overflow suppression) fails the job.
      - name: Run sanitizer suite
        run: scripts/run_sanitizers.sh
